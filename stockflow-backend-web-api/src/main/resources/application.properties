
# Define el prefijo global de la aplicación
server.servlet.context-path=/stockflow-backend

# 1. Configuracion de Conexion spring.application.name=stockflow-backend-web-api
# IMPORTANTE: Configurar estas variables de entorno en tu sistema o IDE
spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD}}


# 2. Estrategia de JPA - USA 'validate' porque  BD y tablas ya existe
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database=mysql
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 3. Logs para Desarrollo
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 4. Compatibilidad con nombres (Importante para las tablas)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 5. usuario y password para login - fijo - provicional
#spring.security.user.name=admin
#spring.security.user.password=admin123
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# 6. JWT Configuration
# IMPORTANTE: Configurar estas variables de entorno en tu sistema o IDE
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION}

# Muestra todo el proceso de seguridad (filtros, autenticación, etc.)
logging.level.org.springframework.security=WARN 
# Muestra detalles de la carga de usuarios
logging.level.org.springframework.security.authentication.dao=WARN

# ==========================================
# HIKARI - POOL DE CONEXIONES
# ==========================================
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
 
# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.fetch_size=50
 
# ==========================================
# CACHE DE SEGUNDO NIVEL
# Activar cuando agregues dependencia de cache (ehcache o caffeine)
# ==========================================
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
 
# ==========================================
# SERVIDOR TOMCAT
# ==========================================
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.tomcat.connection-timeout=60000
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
 
# ==========================================
# JACKSON - SERIALIZACIÓN JSON
# ==========================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
 
# ==========================================
# LOGGING
# ==========================================
logging.level.root=WARN
logging.level.com.stockflow=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.zaxxer.hikari=WARN

# Fuerza a HikariCP a reutilizar conexiones
spring.datasource.hikari.pool-name=StockFlowPool
spring.datasource.hikari.auto-commit=true

# Mantener conexiones vivas (evita que Aiven las corte)
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# Asegura que el pool se inicialice al arrancar
spring.datasource.hikari.initialization-fail-timeout=0
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
